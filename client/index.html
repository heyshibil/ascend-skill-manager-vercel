<!doctype html>
<html lang="en" style="background-color: #0C0C0B; margin: 0; padding: 0;">

<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/svg+xml" href="/vite.svg" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Ascend — Career skill verification, tracking, and market intelligence platform." />
  <title>Ascend</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@400;450;500;600;700&family=JetBrains+Mono:wght@400;500;600;700&display=swap"
    rel="stylesheet" />
</head>

<body style="background-color: #0C0C0B; margin: 0; padding: 0;">
  <div id="root">
    <!-- Static HTML Preloader - Rendered immediately while JS loads -->
    <div
      style="background-color: #0c0c0b; min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; font-family: 'Inter', sans-serif;">
      <div style="display: flex; flex-direction: column; align-items: center; gap: 24px;">
        <div
          style="font-size: 28px; font-weight: 600; letter-spacing: 0.2em; color: #f2f1ee; text-transform: uppercase; opacity: 0.8;">
          Ascend
        </div>
        <div
          style="position: relative; width: 128px; height: 2px; background-color: #1a1a18; overflow: hidden; border-radius: 9999px;">
          <div
            style="position: absolute; height: 100%; width: 50%; background: #2563eb; border-radius: 9999px; left: 25%; box-shadow: 0 0 12px #2563eb;">
          </div>
        </div>
      </div>
    </div>
  </div>
  <script type="module" src="/src/main.jsx"></script>
</body>

</html>
